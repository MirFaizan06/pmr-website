[build]
  publish = "."

# Security + default headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://mirfaizan06.github.io;"

# version.json — never cache; allow app to fetch cross-origin
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control              = "no-store, no-cache, must-revalidate"
    Access-Control-Allow-Origin = "*"

# issued_licenses.json — same: no cache, public read
[[headers]]
  for = "/issued_licenses.json"
  [headers.values]
    Cache-Control              = "no-store, no-cache, must-revalidate"
    Access-Control-Allow-Origin = "*"

# Static assets — long-lived cache (versioned by content hash on deploy)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
